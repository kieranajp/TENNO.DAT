apiVersion: 1
groups:
  - orgId: 1
    name: tenno-de
    folder: TENNO.DAT
    interval: 1m
    rules:
      - uid: tenno-de-403
        title: DE profile fetch blocked (403)
        condition: C
        for: 5m
        # No 403s => query returns no series => NoData => stay OK (silence is good here).
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: victoriametrics
            model:
              refId: A
              editorMode: code
              expr: sum(increase(tenno_de_profile_fetch_errors_total{app="tenno-api", error_type="rate_limited"}[1h]))
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
        labels:
          severity: warning
        annotations:
          summary: DE is 403ing tenno's Mullvad exit — profile sync is down. Check the gluetun sidecar and the Mullvad slot/key.

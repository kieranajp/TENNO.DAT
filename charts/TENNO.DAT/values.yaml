namespace: apps

api:
  replicaCount: 1
  image:
    repository: ghcr.io/kieranajp/tenno.dat-api
    tag: latest
  imagePullSecrets:
    - ghcr-secret
  service:
    port: 3000
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

web:
  replicaCount: 1
  image:
    repository: ghcr.io/kieranajp/tenno.dat-web
    tag: latest
  imagePullSecrets:
    - ghcr-secret
  service:
    port: 3000
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18-alpine"
  persistence:
    enabled: true
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

ingress:
  enabled: true
  tls:
    enabled: true
    certResolver: letsencrypt
  routes:
    web:
      host: "tenno.club"
      port: 3000
    api:
      host: "api.tenno.club"
      port: 3000
  redirects:
    - from: "tenno.kieranajp.uk"
      to: "https://tenno.club"

# Route the API's public egress through Mullvad (DE blocks our home + Cloudflare IPs).
# Requires: (1) the `apps` namespace labelled pod-security privileged in seldon,
# (2) WIREGUARD_PRIVATE_KEY + WIREGUARD_ADDRESSES added to the tenno-secrets
# 1Password item. Only public traffic uses the tunnel; cluster traffic goes direct.
vpn:
  enabled: true
  provider: mullvad
  serverCountries: "Netherlands"          # any non-blocked exit; tune for latency
  outboundSubnets: "10.0.0.0/24,10.96.0.0/12"  # Cilium node pod CIDR + service CIDR (Postgres, CoreDNS); /24 = single node
  keepClusterDNS: true                    # keep CoreDNS so tenno-postgresql resolves
  inputPorts: "3000"                      # let Traefik reach the API on the LAN side

secretName: tenno-secrets

onepassword:
  vault: Homelab
  item: tenno-secrets
